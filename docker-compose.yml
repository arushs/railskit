services:
  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: railskit
      POSTGRES_PASSWORD: railskit
      POSTGRES_DB: railskit_development
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0"
    volumes:
      - ./api:/app
      - api_bundle:/app/vendor/bundle
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://railskit:railskit@db:5432/railskit_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      CORS_ORIGINS: http://localhost:5173

  web:
    build:
      context: ./web
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000

volumes:
  postgres_data:
  api_bundle:
  web_node_modules:
