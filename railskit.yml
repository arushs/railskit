app:
  name: "RailsKit"
  domain: "localhost"

database:
  adapter: "postgresql"  # postgresql | supabase | convex

auth:
  provider: "devise"  # devise | supabase | clerk
  google_oauth: true
  magic_links: true

payments:
  provider: "stripe"  # stripe | lemon_squeezy

email:
  provider: "resend"  # resend | postmark | smtp
  from: "RailsKit <noreply@yourdomain.com>"

ai:
  provider: "openai"  # openai | anthropic | google | ollama
  model: "gpt-4o"

rag:
  embedding_provider: "openai"  # openai | ollama
  embedding_model: "text-embedding-3-small"
  chunk_size: 512       # tokens per chunk
  overlap: 64           # token overlap between chunks

voice:
  stt_provider: "openai"    # openai | deepgram
  stt_model: "whisper-1"
  tts_provider: "openai"    # openai | elevenlabs
  tts_model: "tts-1"
  tts_voice: "alloy"        # alloy | echo | fable | onyx | nova | shimmer

theme:
  primary_color: "#6366f1"
  dark_mode: true
